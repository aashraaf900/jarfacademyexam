<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Live Exam</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center;
        }
        h2 { color: #2c3e50; font-weight: 700; margin-bottom: 25px; font-size: 26px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group input {
            width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px;
            font-size: 16px; font-family: 'Hind Siliguri', sans-serif; box-sizing: border-box; transition: 0.3s;
        }
        .input-group input:focus { border-color: #3498db; outline: none; box-shadow: 0 0 8px rgba(52, 152, 219, 0.3); }
        .btn-submit {
            background: #2c3e50; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-submit:hover { background: #1a252f; transform: translateY(-2px); }
        .user-link { display: block; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 15px; transition: 0.3s; }
        .user-link:hover { color: #3498db; text-decoration: underline; }
        .alert { background: #ff7675; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>অ্যাডমিন প্যানেল</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}<div class="alert">{{ messages[0] }}</div>{% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <input type="text" name="username" placeholder="ইউজারনেম (admin)" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="পাসওয়ার্ড" required>
            </div>
            <button type="submit" class="btn-submit">লগিন করুন</button>
        </form>
        <a href="/" class="user-link">শিক্ষার্থী লগিন-এ ফিরে যান</a>
    </div>
</body>
</html>
