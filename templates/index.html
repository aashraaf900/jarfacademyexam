<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Live Exam</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center;
        }
        h2 { color: #2c3e50; font-weight: 700; margin-bottom: 30px; font-size: 28px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group input {
            width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px;
            font-size: 16px; font-family: 'Hind Siliguri', sans-serif; transition: 0.3s;
            box-sizing: border-box;
        }
        .input-group input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 8px rgba(0,123,255,0.2); }
        .btn-submit {
            background: linear-gradient(to right, #007bff, #0056b3); color: white;
            border: none; padding: 14px; width: 100%; border-radius: 8px;
            font-size: 18px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,123,255,0.4); }
        .admin-link { display: block; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 15px; transition: 0.3s;}
        .admin-link:hover { color: #2c3e50; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>শিক্ষার্থী লগিন</h2>
        <form method="POST">
            <div class="input-group">
                <input type="text" name="name" placeholder="আপনার সম্পূর্ণ নাম" required>
            </div>
            <div class="input-group">
                <input type="email" name="email" placeholder="আপনার জিমেইল অ্যাড্রেস" required>
            </div>
            <button type="submit" class="btn-submit">প্রবেশ করুন</button>
        </form>
        <a href="/admin" class="admin-link">অ্যাডমিন হিসেবে লগিন করুন</a>
    </div>
</body>
</html>
