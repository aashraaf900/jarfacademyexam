<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Live Exam</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f4f7f6; margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .dashboard-container { background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { color: #2c3e50; margin: 0; font-size: 26px; }
        .header p { color: #7f8c8d; font-size: 16px; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; color: #34495e; margin-bottom: 8px; font-size: 16px; }
        select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; font-family: 'Hind Siliguri', sans-serif; cursor: pointer; transition: 0.3s; outline: none; }
        select:focus { border-color: #27ae60; }
        .btn-start { background: #27ae60; color: white; padding: 14px; width: 100%; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-start:hover { background: #219150; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3); }
        .logout-btn { display: block; text-align: center; margin-top: 25px; color: #e74c3c; text-decoration: none; font-weight: 600; transition: 0.3s; }
        .logout-btn:hover { color: #c0392b; text-decoration: underline; }
        .alert { background: #ffeaa7; color: #d35400; padding: 10px; border-radius: 5px; text-align: center; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h2>স্বাগতম, {{ name }}!</h2>
            <p>আপনার পরীক্ষার সেটিংস নির্বাচন করুন</p>
        </div>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}<div class="alert">{{ messages[0] }}</div>{% endif %}
        {% endwith %}
        
        <form action="/exam" method="POST">
            <div class="form-group">
                <label>প্রশ্নের সংখ্যা:</label>
                <select name="q_count">
                    <option value="2">২ টি প্রশ্ন (ডেমো)</option>
                    <option value="5">৫ টি প্রশ্ন</option>
                    <option value="10">১০ টি প্রশ্ন</option>
                    <option value="20">২০ টি প্রশ্ন</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>সময় (মিনিট):</label>
                <select name="time_limit">
                    <option value="1">১ মিনিট</option>
                    <option value="5">৫ মিনিট</option>
                    <option value="10">১০ মিনিট</option>
                </select>
            </div>
            
            <button type="submit" class="btn-start">পরীক্ষা শুরু করুন</button>
        </form>
        <a href="/logout" class="logout-btn">লগআউট করুন</a>
    </div>
</body>
</html>
